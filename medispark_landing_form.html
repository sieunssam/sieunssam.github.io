<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>브레인시티 메디스파크 상담 폼</title>
    <style>
      :root {
        --bg: #f4f8f8;
        --panel: #ffffff;
        --primary: #0f8f97;
        --primary-dark: #0a6770;
        --text: #173033;
        --muted: #5d7376;
        --line: #dbe8e9;
        --accent: #ff9f1a;
        --success: #127a47;
        --error: #c03f3f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Pretendard", "Noto Sans KR", sans-serif;
        background:
          radial-gradient(circle at top right, rgba(15, 143, 151, 0.18), transparent 25%),
          linear-gradient(180deg, #eef7f8 0%, #f8fbfb 100%);
        color: var(--text);
      }

      .page {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .card {
        width: 100%;
        max-width: 520px;
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: 0 18px 60px rgba(17, 54, 58, 0.12);
        overflow: hidden;
      }

      .hero {
        padding: 28px 28px 18px;
        background:
          linear-gradient(135deg, rgba(15, 143, 151, 0.96), rgba(45, 102, 165, 0.92)),
          #0f8f97;
        color: #fff;
      }

      .eyebrow {
        display: inline-block;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.18);
        font-size: 12px;
        font-weight: 700;
      }

      h1 {
        margin: 14px 0 10px;
        font-size: 28px;
        line-height: 1.2;
      }

      .hero p {
        margin: 0;
        font-size: 15px;
        line-height: 1.6;
        color: rgba(255, 255, 255, 0.92);
      }

      .body {
        padding: 28px;
      }

      .guide {
        margin: 0 0 18px;
        padding: 16px;
        border-radius: 16px;
        background: #f5fbfb;
        border: 1px solid #d7ecee;
      }

      .guide strong {
        display: block;
        margin-bottom: 8px;
        font-size: 15px;
      }

      .guide p {
        margin: 4px 0;
        font-size: 14px;
        line-height: 1.55;
        color: var(--muted);
      }

      .field {
        margin-bottom: 14px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-size: 14px;
        font-weight: 700;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px 16px;
        font: inherit;
        color: var(--text);
        background: #fff;
      }

      input:focus,
      select:focus,
      textarea:focus {
        outline: 2px solid rgba(15, 143, 151, 0.18);
        border-color: var(--primary);
      }

      .inline {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }

      .actions {
        display: flex;
        gap: 12px;
        margin-top: 18px;
      }

      button {
        flex: 1;
        border: 0;
        border-radius: 14px;
        padding: 15px 16px;
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      .primary {
        background: linear-gradient(180deg, var(--primary) 0%, var(--primary-dark) 100%);
        color: #fff;
      }

      .secondary {
        background: #eef6f7;
        color: var(--text);
      }

      .help {
        margin-top: 14px;
        font-size: 13px;
        color: var(--muted);
        line-height: 1.55;
      }

      .status {
        margin-top: 14px;
        padding: 12px 14px;
        border-radius: 12px;
        display: none;
        font-size: 14px;
        font-weight: 700;
      }

      .status.success {
        display: block;
        background: #ecfaf2;
        color: var(--success);
        border: 1px solid #bfe6cc;
      }

      .status.error {
        display: block;
        background: #fff2f2;
        color: var(--error);
        border: 1px solid #f0c3c3;
      }

      @media (max-width: 640px) {
        .page {
          padding: 12px;
        }

        .hero,
        .body {
          padding: 20px;
        }

        .inline,
        .actions {
          grid-template-columns: 1fr;
          flex-direction: column;
        }

        h1 {
          font-size: 24px;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <section class="card">
        <div class="hero">
          <span class="eyebrow">브레인시티 메디스파크</span>
          <h1>상담하기</h1>
          <p>이름과 연락처만 남겨주시면 확인 후 빠르게 상담 도와드립니다.</p>
        </div>

        <div class="body">
          <div class="guide">
            <strong>입력 부담을 줄인 간단 상담 접수</strong>
            <p>복잡한 절차 없이 이름과 연락처만 먼저 남겨주세요.</p>
            <p>남겨주신 정보는 요청하신 분양 상담 안내 외 다른 용도로 사용되지 않습니다.</p>
            <p>원하실 때만 상담 연결해드리니 편하게 접수하시면 됩니다.</p>
          </div>

          <form id="lead-form" novalidate>
            <input type="hidden" name="developer" value="박시은" />
            <input type="hidden" name="page_url" id="page_url" value="" />
            <input type="hidden" name="device" id="device" value="" />
            <input type="hidden" name="utm_source" id="utm_source" value="" />
            <input type="hidden" name="utm_medium" id="utm_medium" value="" />
            <input type="hidden" name="utm_campaign" id="utm_campaign" value="" />

            <div class="inline">
              <div class="field">
                <label for="name">이름</label>
                <input id="name" name="name" type="text" placeholder="예: 홍길동" required />
              </div>

              <div class="field">
                <label for="phone">연락처</label>
                <input id="phone" name="phone" type="tel" inputmode="numeric" placeholder="예: 010-1234-5678" required />
              </div>
            </div>

            <div class="inline">
              <div class="field">
                <label for="consult_type">상담 유형</label>
                <select id="consult_type" name="consult_type">
                  <option value="상담하기">상담하기</option>
                  <option value="관심고객등록">관심고객 등록</option>
                  <option value="방문예약">방문예약</option>
                </select>
              </div>

              <div class="field">
                <label for="interest_type">관심 타입</label>
                <select id="interest_type" name="interest_type">
                  <option value="">선택 안 함</option>
                  <option value="59A">59A</option>
                  <option value="59B">59B</option>
                  <option value="84A">84A</option>
                  <option value="84B">84B</option>
                  <option value="101">101</option>
                </select>
              </div>
            </div>

            <div class="inline">
              <div class="field">
                <label for="visit_request">방문예약 여부</label>
                <select id="visit_request" name="visit_request">
                  <option value="N">아니오</option>
                  <option value="Y">예</option>
                </select>
              </div>

              <div class="field">
                <label for="visit_datetime">방문 희망일시</label>
                <input id="visit_datetime" name="visit_datetime" type="text" placeholder="예: 6/30 오후 2시" />
              </div>
            </div>

            <div class="field">
              <label for="memo">메모</label>
              <textarea id="memo" name="memo" rows="4" placeholder="궁금한 점이 있으면 남겨주세요."></textarea>
            </div>

            <div class="actions">
              <button type="submit" class="primary" id="submit-button">상담 연결받기</button>
              <button type="button" class="secondary" id="call-button">전화걸기 010-6689-2348</button>
            </div>

            <p class="help">
              전화걸기를 누르기 전에도 이름과 연락처를 먼저 남기면 상담 이력 관리와 빠른 회신이 가능합니다.
            </p>

            <div id="status" class="status"></div>
          </form>
        </div>
      </section>
    </div>

    <script>
      const APP_SCRIPT_URL = "https://script.google.com/macros/s/REPLACE_WITH_DEPLOYMENT_ID/exec";
      const PHONE_NUMBER = "010-6689-2348";

      function getDeviceType() {
        return window.innerWidth <= 768 ? "mobile" : "desktop";
      }

      function getQueryValue(name) {
        const params = new URLSearchParams(window.location.search);
        return params.get(name) || "";
      }

      function digitsOnly(value) {
        return String(value || "").replace(/\D/g, "");
      }

      function showStatus(message, type) {
        const status = document.getElementById("status");
        status.textContent = message;
        status.className = `status ${type}`;
      }

      function clearStatus() {
        const status = document.getElementById("status");
        status.textContent = "";
        status.className = "status";
      }

      function buildPayload(form) {
        const data = new FormData(form);
        return {
          name: String(data.get("name") || "").trim(),
          phone: String(data.get("phone") || "").trim(),
          developer: String(data.get("developer") || "").trim(),
          consult_type: String(data.get("consult_type") || "").trim(),
          interest_type: String(data.get("interest_type") || "").trim(),
          visit_request: String(data.get("visit_request") || "N").trim(),
          visit_datetime: String(data.get("visit_datetime") || "").trim(),
          page_url: String(data.get("page_url") || window.location.href).trim(),
          device: String(data.get("device") || getDeviceType()).trim(),
          utm_source: String(data.get("utm_source") || "").trim(),
          utm_medium: String(data.get("utm_medium") || "").trim(),
          utm_campaign: String(data.get("utm_campaign") || "").trim(),
          memo: String(data.get("memo") || "").trim(),
        };
      }

      function validatePayload(payload) {
        if (!payload.name) {
          return "이름을 입력해주세요.";
        }
        if (digitsOnly(payload.phone).length < 9) {
          return "연락처를 정확히 입력해주세요.";
        }
        if (payload.developer !== "박시은") {
          return "개발자 정보가 올바르지 않습니다.";
        }
        return "";
      }

      async function submitLead(payload) {
        const response = await fetch(APP_SCRIPT_URL, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify(payload),
        });

        const result = await response.json();
        if (!response.ok || !result.ok) {
          throw new Error(result.message || "상담 접수 중 오류가 발생했습니다.");
        }
        return result;
      }

      document.getElementById("page_url").value = window.location.href;
      document.getElementById("device").value = getDeviceType();
      document.getElementById("utm_source").value = getQueryValue("utm_source");
      document.getElementById("utm_medium").value = getQueryValue("utm_medium");
      document.getElementById("utm_campaign").value = getQueryValue("utm_campaign");

      document.getElementById("lead-form").addEventListener("submit", async (event) => {
        event.preventDefault();
        clearStatus();

        const form = event.currentTarget;
        const button = document.getElementById("submit-button");
        const payload = buildPayload(form);
        const error = validatePayload(payload);
        if (error) {
          showStatus(error, "error");
          return;
        }

        button.disabled = true;
        button.textContent = "접수 중...";

        try {
          await submitLead(payload);
          showStatus("상담 접수가 완료되었습니다. 담당자가 빠르게 연락드립니다.", "success");
          form.reset();
          form.developer.value = "박시은";
          document.getElementById("page_url").value = window.location.href;
          document.getElementById("device").value = getDeviceType();
          document.getElementById("utm_source").value = getQueryValue("utm_source");
          document.getElementById("utm_medium").value = getQueryValue("utm_medium");
          document.getElementById("utm_campaign").value = getQueryValue("utm_campaign");
        } catch (err) {
          showStatus(err.message || "상담 접수 중 오류가 발생했습니다.", "error");
        } finally {
          button.disabled = false;
          button.textContent = "상담 연결받기";
        }
      });

      document.getElementById("call-button").addEventListener("click", async () => {
        clearStatus();

        const form = document.getElementById("lead-form");
        const payload = buildPayload(form);
        const error = validatePayload(payload);
        if (error) {
          showStatus("전화 연결 전 이름과 연락처를 먼저 입력해주세요.", "error");
          return;
        }

        try {
          await submitLead(payload);
          window.location.href = `tel:${PHONE_NUMBER}`;
        } catch (err) {
          showStatus(err.message || "전화 연결 전 접수 저장에 실패했습니다.", "error");
        }
      });
    </script>
  </body>
</html>
